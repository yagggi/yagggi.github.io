<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>文字处理工具 · 字库过滤 & 去重</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f7fa;
    color: #1f2937;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 20px 24px 8px;
    text-align: center;
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 600;
  }
  header p {
    margin: 6px 0 0;
    font-size: 13px;
    color: #6b7280;
  }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px 24px;
    min-height: 0;
  }
  .panel {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #f1f1f1;
    background: #fafafa;
  }
  .panel-header h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
  }
  .panel-header .count {
    font-size: 12px;
    color: #6b7280;
  }
  textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    padding: 12px 14px;
    font-size: 14px;
    line-height: 1.6;
    font-family: inherit;
    min-height: 240px;
  }
  .toolbar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 8px 24px 4px;
    flex-wrap: wrap;
  }
  button {
    padding: 9px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, transform .05s;
  }
  button:active { transform: translateY(1px); }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: #e5e7eb; color: #1f2937; }
  .btn-secondary:hover { background: #d1d5db; }
  .output {
    margin: 8px 24px 20px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    overflow: hidden;
  }
  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid #f1f1f1;
    background: #fafafa;
  }
  .output-header h2 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
  }
  .output-header .meta { font-size: 12px; color: #6b7280; }
  #result {
    padding: 12px 14px;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 14px;
    line-height: 1.7;
    min-height: 80px;
    color: #111827;
  }
  #result:empty::before {
    content: "（点击「处理」后，结果会显示在这里）";
    color: #9ca3af;
  }
  footer {
    text-align: center;
    color: #9ca3af;
    font-size: 12px;
    padding: 8px 0 16px;
  }
  @media (max-width: 720px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <header>
    <h1>文字处理工具</h1>
    <p>左侧输入字库 · 右侧输入文本 · 点击按钮去除字库中字符并去重</p>
  </header>

  <main>
    <section class="panel">
      <div class="panel-header">
        <h2>字库（左）</h2>
        <span class="count" id="libCount">0 字符</span>
      </div>
      <textarea id="library" placeholder="在此输入字库，例如：的了是我不在人们有来他这上着个地到大里说就去子得也和那要下看天时..."></textarea>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>待处理文本（右）</h2>
        <span class="count" id="inputCount">0 字符</span>
      </div>
      <textarea id="input" placeholder="在此输入任意文本..."></textarea>
    </section>
  </main>

  <div class="toolbar">
    <button class="btn-primary" id="processBtn">处理（去字库 + 去重）</button>
    <button class="btn-secondary" id="clearBtn">清空</button>
    <button class="btn-secondary" id="copyBtn">复制结果</button>
  </div>

  <section class="output">
    <div class="output-header">
      <h2>结果</h2>
      <span class="meta" id="resultMeta"></span>
    </div>
    <div id="result"></div>
  </section>

  <footer>Hosted on GitHub Pages</footer>

<script>
  const libraryEl = document.getElementById('library');
  const inputEl   = document.getElementById('input');
  const libCount  = document.getElementById('libCount');
  const inputCount= document.getElementById('inputCount');
  const resultEl  = document.getElementById('result');
  const resultMeta= document.getElementById('resultMeta');

  const updateCounts = () => {
    libCount.textContent   = `${[...libraryEl.value].length} 字符`;
    inputCount.textContent = `${[...inputEl.value].length} 字符`;
  };
  libraryEl.addEventListener('input', updateCounts);
  inputEl.addEventListener('input', updateCounts);

  // 使用 Array.from 拆分，正确处理代理对（含 emoji、扩展汉字等）
  const toChars = (s) => Array.from(s);

  const process = () => {
    const libSet = new Set(toChars(libraryEl.value));
    const seen = new Set();
    const out = [];
    for (const ch of toChars(inputEl.value)) {
      if (libSet.has(ch)) continue;   // 过滤字库中的字符
      if (seen.has(ch)) continue;     // 去重
      seen.add(ch);
      out.push(ch);
    }
    const result = out.join('');
    resultEl.textContent = result;
    resultMeta.textContent = `共 ${out.length} 个不重复字符`;
  };

  document.getElementById('processBtn').addEventListener('click', process);

  document.getElementById('clearBtn').addEventListener('click', () => {
    libraryEl.value = '';
    inputEl.value = '';
    resultEl.textContent = '';
    resultMeta.textContent = '';
    updateCounts();
  });

  document.getElementById('copyBtn').addEventListener('click', async () => {
    const text = resultEl.textContent;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      const btn = document.getElementById('copyBtn');
      const old = btn.textContent;
      btn.textContent = '已复制 ✓';
      setTimeout(() => btn.textContent = old, 1200);
    } catch (e) {
      alert('复制失败，请手动选择文本复制。');
    }
  });

  updateCounts();
</script>
</body>
</html>
